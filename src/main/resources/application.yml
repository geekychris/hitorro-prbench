server:
  port: 8090

spring:
  application:
    name: hitorro-pr-bench
  datasource:
    url: jdbc:h2:file:./data/prbench
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  github:
    token: ${GITHUB_TOKEN:}
    api-url: https://api.github.com
    poll-interval-seconds: 30
    default-bot-timeout-seconds: 600
  workspace:
    base-path: ${user.home}/.pr-bench/workspaces
  run:
    default-concurrency: 2
    max-concurrency: 10
  similarity:
    default-strategies: FILE_LINE,NORMALIZED_TEXT,WINNOWING
    winnowing-k: 5
    winnowing-w: 4
    text-similarity-threshold: 0.8

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hitorro.prbench: DEBUG
